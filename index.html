<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026FC懇親会 席次検索</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    .header { 
      text-align: center; 
      color: white; 
      margin-bottom: 20px; 
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .search-container {
      position: relative;
      margin-bottom: 25px;
    }
    .search-box { 
      width: 100%; 
      padding: 22px 25px 22px 55px; 
      font-size: 18px; 
      border: 4px solid #FFD700;
      border-radius: 25px; 
      box-shadow: 0 8px 30px rgba(255,215,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
      margin-bottom: 10px;
      background: rgba(255,255,255,0.98);
      transition: all 0.3s ease;
      font-weight: 600;
      z-index: 1;
    }
    .search-box:focus {
      outline: none;
      border-color: #FFA500;
      box-shadow: 0 10px 40px rgba(255,165,0,0.5), 0 0 0 1px rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .search-box::placeholder {
      color: #666;
      font-weight: 500;
    }
    .search-icon {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: #FF8C00;
      z-index: 2;
      pointer-events: none;
    }
    .search-label {
      position: absolute;
      right: 20px;
      top: -15px;
      background: #FF4500;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(255,69,0,0.4);
      animation: bounce 2s infinite;
      z-index: 3;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
      60% { transform: translateY(-3px); }
    }
    .instructions { 
      background: rgba(255,255,255,0.9); 
      padding: 15px; 
      border-radius: 12px; 
      margin-bottom: 20px; 
      text-align: center;
      font-size: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    
    .seating-container {
      background: rgba(255,255,255,0.15); 
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      padding: 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(5, auto);
      gap: 20px 30px;
      max-width: 100%;
    }
    
    .block {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 4px;
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      position: relative;
      min-height: 200px;
    }
    
    .seat { 
      background: rgba(255,255,255,0.92); 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 8px; 
      font-weight: 600;
      border-radius: 6px; 
      transition: all 0.25s ease; 
      cursor: pointer;
      position: relative;
      border: 2px solid transparent;
      width: 52px;     
      height: 26px;    
      margin: 0 auto;
    }
    
    .seat:hover { 
      transform: scale(1.08); 
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    
    .highlight { 
      background: linear-gradient(45deg, #ffeb3b, #ff9800) !important; 
      box-shadow: 0 0 25px rgba(255,235,59,0.9) !important;
      transform: scale(1.15) !important;
      animation: pulse 0.8s infinite;
      border-color: #f57c00 !important;
    }
    
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 25px rgba(255,235,59,0.9); }
      50% { box-shadow: 0 0 35px rgba(255,235,59,1); }
    }
    
    .seat-name { 
      font-size: 6px;  
      line-height: 1; 
      max-width: 85%;
      text-align: center;
      word-break: break-all;
      margin-bottom: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seat-id { 
      font-size: 5.5px; 
      opacity: 0.8;
    }
    
    .loading { 
      text-align: center; 
      padding: 50px 15px; 
      font-size: 16px; 
      color: white; 
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      margin: 20px 0;
    }
    
    .block-label {
      position: absolute;
      top: -12px;
      left: 12px;
      background: rgba(255,255,255,0.9);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      color: #333;
      z-index: 1;
    }
    
    @media (max-width: 480px) { 
      body { padding: 10px; }
      .search-box { padding: 20px 22px 20px 50px; font-size: 16px; }
      .search-icon { width: 18px; height: 18px; left: 20px; }
      .seat { 
        width: 48px; 
        height: 24px;  
      }
      .seat-name { font-size: 5.5px; }
      .seat-id { font-size: 5px; }
      .block { 
        padding: 8px; 
        min-height: 180px; 
        gap: 3px;
      }
      .seating-container { gap: 15px 20px; }
    }
  </style>
</head>

    window.onload = function() {
      displaySeating();
    };
    
    document.getElementById('searchInput').addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      document.querySelectorAll('.seat').forEach(seat => {
        seat.classList.remove('highlight');
        if (query && seat.dataset.store && 
            seat.dataset.store.toLowerCase().includes(query)) {
          seat.classList.add('highlight');
          seat.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center',
            inline: 'nearest'
          });
        }
      });
    });
    
    function displaySeating() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('seatingContainer').style.display = 'grid';
      
      const container = document.getElementById('seatingContainer');
      
      for(let blockRow = 0; blockRow < 5; blockRow++) {
        for(let blockCol = 0; blockCol < 7; blockCol++) {
          const block = document.createElement('div');
          block.className = 'block';
          
          const rowLetter = String.fromCharCode(65 + blockRow);
          const colNumber = blockCol + 1;
          const blockName = `${rowLetter}${colNumber}`;
          
          const label = document.createElement('div');
          label.className = 'block-label';
          label.textContent = blockName;
          block.appendChild(label);
          
          // ✅ 新しい配置ルール：縦方向1-6, 右列7-12
          // A1-1の下→A1-2, A1-1の右→A1-7
          for(let gridRow = 0; gridRow < 6; gridRow++) {
            for(let gridCol = 0; gridCol < 2; gridCol++) {
              // 左列（0）：1-6番、右列（1）：7-12番
              let seatNum;
              if (gridCol === 0) {
                seatNum = gridRow + 1;  // 左列：1,2,3,4,5,6
              } else {
                seatNum = gridRow + 7;  // 右列：7,8,9,10,11,12
              }
              
              const newSeatId = `${blockName}-${seatNum.toString().padStart(2, '0')}`;
              
              // 元データとのマッピング（A1ブロックの例）
              // A1-1→A-01, A1-2→A-03, A1-7→A-02, A1-8→A-04...
              let originalSeatNum;
              if (seatNum <= 6) {
                originalSeatNum = (seatNum - 1) * 2 + 1; // 奇数：01,03,05...
              } else {
                originalSeatNum = (seatNum - 7) * 2 + 2; // 偶数：02,04,06...
              }
              
              const seatData = seatingData.find(s => s.seat === newSeatId); // シンプル！
              
              const seat = document.createElement('div');
              seat.className = 'seat';
              
              if (seatData) {
                seat.innerHTML = `
                  <div class="seat-name">${seatData.store}</div>
                  <div class="seat-id">${newSeatId}</div>
                `;
                seat.dataset.store = seatData.store;
                seat.onclick = () => {
                  navigator.vibrate?.(100);
                  alert(`${seatData.store}\n席番号：${newSeatId}`);
                };
              } else {
                seat.innerHTML = `<div class="seat-id">${newSeatId}</div>`;
                seat.dataset.store = '';
                seat.style.opacity = '0.4';
                seat.onclick = () => alert(`席番号：${newSeatId}\n（空席）`);
              }
              seat.dataset.seatId = newSeatId;
              block.appendChild(seat);
            }
          }
          container.appendChild(block);
        }
      }
    }
  </script>
